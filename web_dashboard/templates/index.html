<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UCar CPU vs BPU 推理对比</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0e17; color:#ccc; font-family:'Consolas','Courier New',monospace; }
/* 顶部标题栏 */
.bar { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; background:#111; border-bottom:2px solid #333; }
.bar h1 { color:#ff7f00; font-size:16px; }
.badge { padding:4px 10px; border-radius:4px; font-size:12px; font-weight:700; }
.badge.green { background:#065f46; color:#6ee7b7; }
.badge.red { background:#991b1b; color:#fca5a5; animation:blink .5s infinite alternate; }

/* 三栏布局 */
.grid { display:grid; grid-template-columns:1fr 320px 1fr; gap:2px; height:calc(100vh - 120px); background:#000; }
.video-box { position:relative; background:#0d0d0d; display:flex; flex-direction:column; }
.video-box h3 { padding:6px 10px; font-size:13px; text-align:center; }
.video-box img { flex:1; width:100%; object-fit:contain; min-height:0; }

/* FPS 叠加层 */
.fps-overlay {
  position:absolute; top:36px; left:8px;
  font-size:28px; font-weight:900; padding:4px 12px; border-radius:4px;
  text-shadow:0 0 10px rgba(0,0,0,.8);
}
.fps-cpu { color:#ef4444; border:2px solid #ef4444; }
.fps-bpu { color:#22c55e; border:2px solid #22c55e; }
.latency { font-size:11px; font-weight:400; color:#94a3b8; display:block; }

/* 中央深度面板 */
.center-panel { display:flex; flex-direction:column; }
.depth-box { flex:1; position:relative; background:#0d0d0d; }
.depth-box h3 { padding:6px 10px; font-size:13px; text-align:center; background:#1a1a2e; color:#ff7f00; }
.depth-box img { width:100%; height:100%; object-fit:contain; }
.depth-label { position:absolute; top:36px; right:8px; background:rgba(0,0,0,.7); color:#22c55e; padding:4px 8px; border-radius:4px; font-size:12px; }

/* 终端日志 */
.terminal { background:#0c0c0c; border-top:2px solid #333; height:120px; overflow-y:auto; padding:6px 12px; font-size:11px; line-height:1.6; }
.terminal .ts { color:#64748b; margin-right:8px; }
.terminal .cpu { color:#ef4444; }
.terminal .bpu { color:#22c55e; }
.terminal .info { color:#60a5fa; }
.terminal .warn { color:#fbbf24; }
.terminal .detect { color:#34d399; }

@keyframes blink { from{opacity:1} to{opacity:0.4} }
</style>
</head>
<body>

<div class="bar">
  <h1>UCar 推理对比: CPU (软) vs BPU (硬)</h1>
  <div style="display:flex;gap:10px">
    <span id="fall_badge" class="badge green">跌倒: 正常</span>
    <span id="fire_badge" class="badge green">火警: 正常</span>
    <span id="voice_badge" class="badge green">语音: 待命</span>
  </div>
</div>

<div class="grid">
  <!-- 左: CPU 推理 -->
  <div class="video-box">
    <h3 style="color:#ef4444;">CPU 纯软件推理 (OpenCV)</h3>
    <div class="fps-overlay fps-cpu">
      <span id="cpu_fps">--</span> FPS
      <span class="latency">延迟 <span id="cpu_lat">--</span>ms</span>
    </div>
    <img src="/video/rgb" id="cpu_img">
  </div>

  <!-- 中: 双目深度 -->
  <div class="center-panel">
    <div class="depth-box">
      <h3>双目深度热力图 + 人体检测框</h3>
      <div class="depth-label">深度: <span id="dist_val">--</span>m</div>
      <img src="/video/depth" id="depth_img">
    </div>
  </div>

  <!-- 右: BPU 推理 -->
  <div class="video-box">
    <h3 style="color:#22c55e;">BPU 硬件加速推理 (地平线)</h3>
    <div class="fps-overlay fps-bpu">
      <span id="bpu_fps">--</span> FPS
      <span class="latency">延迟 <span id="bpu_lat">--</span>ms</span>
    </div>
    <img src="/video/rgb" id="bpu_img">
  </div>
</div>

<!-- 终端日志 -->
<div class="terminal" id="terminal">
  <div><span class="ts">[系统]</span> <span class="info">等待 ROS2 数据流...</span></div>
</div>

<script>
const term = document.getElementById('terminal');
function log(ts, cls, msg) {
  term.innerHTML += '<div><span class="ts">['+ts+']</span> <span class="'+cls+'">'+msg+'</span></div>';
  if (term.children.length > 100) term.removeChild(term.firstChild);
  term.scrollTop = term.scrollHeight;
}

let lastState = {};
setInterval(async () => {
  try {
    const r = await fetch('/api/state');
    const s = await r.json();
    const now = new Date().toLocaleTimeString();

    // FPS 显示
    const cpuFps = (s.fps_depth || 0).toFixed(1);
    const bpuFps = (s.fps_rgb || 0).toFixed(1);
    document.getElementById('cpu_fps').textContent = cpuFps;
    document.getElementById('bpu_fps').textContent = bpuFps;
    document.getElementById('cpu_lat').textContent = cpuFps > 0 ? (1000/cpuFps).toFixed(0) : '--';
    document.getElementById('bpu_lat').textContent = bpuFps > 0 ? (1000/bpuFps).toFixed(0) : '--';
    document.getElementById('dist_val').textContent = s.head_height > 0 ? s.head_height.toFixed(1) : '--';

    // 告警
    const fb = document.getElementById('fall_badge');
    const fib = document.getElementById('fire_badge');
    fb.className = s.fall ? 'badge red' : 'badge green';
    fib.className = s.fire ? 'badge red' : 'badge green';
    fb.textContent = s.fall ? '跌倒: 报警!!' : '跌倒: 正常';
    fib.textContent = s.fire ? '火警: 报警!!' : '火警: 正常';

    // 语音
    const vb = document.getElementById('voice_badge');
    vb.className = s.voice_question ? 'badge red' : 'badge green';
    vb.textContent = s.voice_question ? '语音: 对话中' : '语音: 待命';

    // 终端日志 - CPU vs BPU对比
    if (bpuFps != lastState.bpu || cpuFps != lastState.cpu) {
      log(now, 'cpu', 'CPU软推理: '+cpuFps+' FPS, 延迟 '+Math.round(1000/Math.max(cpuFps,0.1))+'ms');
      log(now, 'bpu', 'BPU硬推理: '+bpuFps+' FPS, 延迟 '+Math.round(1000/Math.max(bpuFps,0.1))+'ms');
    }

    // 检测状态变化
    if (s.status != lastState.status) {
      log(now, 'detect', '人体检测: '+s.status+' (头部高度: '+s.head_height+'m)');
    }
    if (s.fall && !lastState.fall) log(now, 'warn', '跌倒报警触发!!');
    if (s.fire && !lastState.fire) log(now, 'warn', '火警告警触发!!');
    if (s.voice_question && s.voice_question != lastState.q) {
      log(now, 'info', 'Q: '+s.voice_question);
      if (s.voice_answer) log(now, 'info', 'A: '+s.voice_answer);
    }

    lastState = {...s, bpu:bpuFps, cpu:cpuFps};
  } catch(e) {}
}, 500);
</script>
</body>
</html>
